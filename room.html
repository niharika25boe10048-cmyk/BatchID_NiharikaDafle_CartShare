<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart Room</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>

<div class="container mt-4">

<h2 id="roomTitle"></h2>

<div class="row">

<div class="col-md-6">

<div class="card p-3">

<h4>Add Item</h4>

<input
type="text"
id="itemName"
class="form-control mb-2"
placeholder="Item Name">

<input
type="number"
id="itemPrice"
class="form-control mb-2"
placeholder="Price">

<button
class="btn btn-primary"
onclick="addItem()">
Add Item
</button>

</div>

</div>

<div class="col-md-6">

<div class="card p-3">

<h4>Activity Log</h4>

<ul id="activityLog"></ul>

</div>

</div>

</div>

<hr>

<div class="card p-3">

<h3>Shared Cart</h3>

<table class="table table-striped">

<thead>
<tr>
<th>Item</th>
<th>Price</th>
<th>Added By</th>
<th>Action</th>
</tr>
</thead>

<tbody id="cartTable"></tbody>

</table>

<a href="receipt.html" class="btn btn-success">
Generate Receipt
</a>

</div>

</div>

<script src="js/storage.js"></script>
<script src="js/sync.js"></script>
<script src="js/room.js"></script>

</body>
</html>
